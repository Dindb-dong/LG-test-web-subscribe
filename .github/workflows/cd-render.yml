name: CD Render Verify

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-render-main
  cancel-in-progress: true

env:
  RENDER_BASE_URL: https://lg-test-web-subscribe.onrender.com

jobs:
  verify-render-deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Show deployment target
        run: echo "Verifying Render deployment at ${RENDER_BASE_URL}"

      - name: Wait for Render health check
        shell: bash
        run: |
          for attempt in {1..30}; do
            echo "Health check attempt ${attempt}/30"
            if curl --fail --silent "${RENDER_BASE_URL}/health"; then
              exit 0
            fi
            sleep 10
          done
          echo "Render health check did not become ready in time."
          exit 1

      - name: Verify deployed subscriber endpoint
        run: curl --fail --silent "${RENDER_BASE_URL}/api/v1/subscribers"

      - name: Verify deployed subscriber device endpoint
        run: curl --fail --silent "${RENDER_BASE_URL}/api/v1/subscribers/U001/devices"

      - name: Verify deployed device usage endpoint
        run: curl --fail --silent "${RENDER_BASE_URL}/api/v1/devices/D001/usage"
